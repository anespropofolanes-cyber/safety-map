<!DOCTYPE html>
<!-- Anesthesia Safety Map | Developed by 心怡 -->
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="author" content="心怡">
<meta name="generator" content="Anesthesia Safety Map">
<title>麻醉安全導航 · Anesthesia Safety Map</title>
<style>
  :root{
    --bg:#f5f6f8; --card:#ffffff; --ink:#22252b; --ink2:#585d68; --muted:#969ba6;
    --line:#e6e8ee; --accent:#535f81; --accent-soft:#ebeef8;
    --danger:#9c4a52; --danger-soft:#f3ebec;
    --c-proc:#535f81; --c-crisis:#9c4a52; --c-equip:#535f81; --c-drug:#535f81; --c-disease:#6b7080;
    --fs:16px;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue","PingFang TC","Microsoft JhengHei",sans-serif;
    font-size:var(--fs);line-height:1.6;-webkit-text-size-adjust:100%}
  .wrap{max-width:760px;margin:0 auto;padding:0 14px 90px}
  header.top{position:sticky;top:0;z-index:20;overflow:hidden;
    background:radial-gradient(120% 160% at 20% 0%, #141a30 0%, #0b1020 55%, #070a16 100%);
    border-bottom:1px solid #232a45;padding:10px 14px;display:flex;align-items:center;gap:10px}
  header.top::before, header.top::after{content:"";position:absolute;inset:0;pointer-events:none;background-repeat:no-repeat}
  header.top::before{background-image:
    radial-gradient(1.3px 1.3px at 12% 42%, #fff, transparent),
    radial-gradient(1px 1px at 27% 72%, #cfe0ff, transparent),
    radial-gradient(1.5px 1.5px at 43% 28%, #fff, transparent),
    radial-gradient(1px 1px at 61% 62%, #d7e6ff, transparent),
    radial-gradient(1.3px 1.3px at 77% 36%, #fff, transparent),
    radial-gradient(1px 1px at 90% 66%, #e6d9ff, transparent);
    animation:twk1 3.6s ease-in-out infinite}
  header.top::after{background-image:
    radial-gradient(1px 1px at 19% 58%, #fff, transparent),
    radial-gradient(1.4px 1.4px at 36% 24%, #fff, transparent),
    radial-gradient(1px 1px at 54% 78%, #cfe0ff, transparent),
    radial-gradient(1.2px 1.2px at 70% 46%, #fff, transparent),
    radial-gradient(1px 1px at 85% 30%, #fff, transparent),
    radial-gradient(1.1px 1.1px at 6% 66%, #fff, transparent);
    animation:twk2 4.7s ease-in-out infinite}
  @keyframes twk1{0%,100%{opacity:.35}50%{opacity:.95}}
  @keyframes twk2{0%,100%{opacity:.9}50%{opacity:.28}}
  @media (prefers-reduced-motion: reduce){header.top::before,header.top::after{animation:none;opacity:.7}}
  header.top .home{position:relative;z-index:1;max-width:760px;margin:0 auto;width:100%;display:flex;align-items:center;gap:10px}
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:1.05rem;letter-spacing:.3px;cursor:pointer;color:#f2f4fb}
  .brand .logo{width:34px;height:34px;border-radius:50%;background:#fff;object-fit:contain;flex:0 0 auto;
    box-shadow:0 0 0 1px rgba(255,255,255,.18), 0 0 10px rgba(150,175,255,.25)}
  .brand small{font-weight:500;color:#93a0c8;font-size:.72rem;display:block;letter-spacing:.5px}
  .spacer{flex:1}
  .fontbtn{border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.06);border-radius:8px;padding:4px 9px;
    font-size:.8rem;cursor:pointer;color:#e7ebf7}
  .fontbtn:active{transform:scale(.96)}
  .fontbtn.back{color:#dfe6ff;border-color:rgba(255,255,255,.4);font-weight:700}
  h1.page{font-size:1.35rem;margin:18px 2px 4px}
  .sub{color:var(--ink2);margin:0 2px 14px;font-size:.92rem}
  .search{width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:11px;font-size:1rem;
    background:var(--card);margin:6px 0 16px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
  @media(max-width:480px){.grid{grid-template-columns:1fr}}
  .entry{background:var(--card);border:1px solid var(--line);border-left:5px solid var(--accent);
    border-radius:13px;padding:14px 15px;cursor:pointer;transition:.12s}
  .entry:active{transform:scale(.985)}
  .entry h3{margin:0 0 3px;font-size:1.04rem}
  .entry p{margin:0;color:var(--ink2);font-size:.85rem}
  .sec-label{font-size:.78rem;font-weight:700;letter-spacing:.8px;color:var(--muted);
    text-transform:uppercase;margin:22px 2px 9px}
  .timeline{display:flex;gap:6px;overflow-x:auto;padding:2px 0 6px}
  .tstep{flex:0 0 auto;background:var(--accent-soft);color:var(--accent);border-radius:9px;
    padding:8px 12px;font-size:.82rem;font-weight:600;white-space:nowrap}
  .list-item{background:var(--card);border:1px solid var(--line);border-radius:11px;padding:13px 15px;
    margin-bottom:9px;cursor:pointer;display:flex;align-items:center;gap:10px}
  .list-item .lv{font-size:.72rem;color:var(--accent);font-weight:700;white-space:nowrap}
  .list-item .nm{flex:1}
  .list-item .arw{color:var(--muted)}
  .tag{display:inline-block;font-size:.72rem;padding:2px 8px;border-radius:20px;
    background:var(--accent-soft);color:var(--accent);margin:0 5px 5px 0;font-weight:600}
  .stub{color:var(--muted);font-style:normal;font-size:.9rem;padding:10px 0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 17px;margin:0 0 14px}
  .card h2{margin:0 0 10px;font-size:1.08rem;display:flex;align-items:center;gap:8px}
  .card h2 .num{background:var(--accent);color:#fff;width:24px;height:24px;border-radius:7px;
    display:inline-flex;align-items:center;justify-content:center;font-size:.82rem;flex:0 0 auto}
  .risk{background:var(--danger-soft);border:1px solid #e6d5d7;border-radius:11px;padding:12px 14px;color:#6f333a;font-size:.95rem}
  .chk{display:flex;align-items:flex-start;gap:10px;padding:8px 2px;border-bottom:1px dashed var(--line)}
  .chk:last-child{border-bottom:none}
  .chk input{width:20px;height:20px;margin-top:2px;flex:0 0 auto;accent-color:var(--accent)}
  .chk label{flex:1;cursor:pointer}
  .chk input:checked + label{color:var(--muted);text-decoration:line-through}
  .chk-group{font-size:.78rem;font-weight:700;color:var(--accent);margin:12px 0 2px;letter-spacing:.5px}
  .tl-row{display:flex;gap:11px;padding:9px 0;border-bottom:1px dashed var(--line)}
  .tl-row:last-child{border-bottom:none}
  .tl-when{flex:0 0 96px;font-weight:700;color:var(--accent);font-size:.9rem}
  .tl-what{flex:1;color:var(--ink2);font-size:.92rem}
  .crisis{border:1px solid #e6d5d7;border-radius:12px;padding:12px 14px;margin-bottom:11px;background:var(--danger-soft)}
  .crisis .ct{font-weight:800;color:var(--c-crisis);margin-bottom:6px}
  .crisis .cr{display:flex;gap:8px;font-size:.9rem;padding:2px 0}
  .crisis .cr b{flex:0 0 62px;color:var(--ink2);font-weight:600}
  .quiz{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 15px;margin-bottom:11px}
  .quiz .q{font-weight:600;margin-bottom:9px}
  .opt{border:1px solid var(--line);border-radius:9px;padding:9px 12px;margin-bottom:7px;cursor:pointer;font-size:.93rem}
  .opt:hover{border-color:var(--accent)}
  .opt.correct{background:var(--accent-soft);border-color:var(--accent)}
  .opt.wrong{background:var(--danger-soft);border-color:#d9b3b7}
  .ans{display:none;margin-top:8px;padding:10px 12px;background:var(--accent-soft);border-radius:9px;font-size:.9rem}
  .ans.show{display:block}
  .flags .tag{background:var(--danger-soft);color:var(--danger)}
  .rookie li{margin-bottom:6px}
  .banner{background:#3d4560;color:#fff;border-radius:14px;padding:18px;
    margin:2px 0 16px;font-size:1.02rem;line-height:1.55}
  .watermark{position:fixed;bottom:10px;right:14px;font-size:12px;color:rgba(0,0,0,.32);
    letter-spacing:.5px;pointer-events:none;z-index:5}
  .empty{text-align:center;color:var(--muted);padding:40px 10px}
  a.plain{color:var(--accent);text-decoration:none;cursor:pointer}
  /* 管理模式 */
  .field{margin-bottom:14px}
  .field label{display:block;font-size:.82rem;font-weight:700;color:var(--ink2);margin-bottom:5px}
  .field .hint{font-weight:400;color:var(--muted);font-size:.76rem}
  .field input[type=text],.field textarea,.field select{width:100%;border:1px solid var(--line);
    border-radius:9px;padding:9px 11px;font-size:.95rem;font-family:inherit;background:#fff}
  .field textarea{min-height:90px;line-height:1.5;resize:vertical}
  .field textarea.big{min-height:150px}
  .btn{border:none;border-radius:10px;padding:11px 16px;font-size:.95rem;font-weight:700;cursor:pointer}
  .btn.primary{background:var(--accent);color:#fff}
  .btn.ghost{background:var(--card);color:var(--ink2);border:1px solid var(--line)}
  .btn.danger{background:#fff;color:var(--danger);border:1px solid #e0c4c8}
  .btnrow{display:flex;gap:9px;flex-wrap:wrap;margin:6px 0 18px}
  .adminrow{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--line);
    border-radius:11px;padding:10px 13px;margin-bottom:8px}
  .adminrow .nm{flex:1}
  .adminrow .mini{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;
    font-size:.82rem;cursor:pointer;color:var(--ink2)}
  .adminrow .mini.del{color:var(--danger);border-color:#e0c4c8}
  .note{background:var(--accent-soft);border-radius:10px;padding:11px 13px;font-size:.86rem;color:var(--ink2);margin-bottom:16px}
  .err{color:var(--c-crisis);font-size:.86rem;margin:4px 2px 10px;min-height:1em}
  .modalbg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
  .modalbox{background:#fff;border-radius:14px;padding:20px;max-width:340px;width:100%}
  .modalbox p{margin:0 0 16px}
  .toast{position:fixed;left:50%;bottom:70px;transform:translateX(-50%) translateY(20px);z-index:60;
    background:#2b2f38;color:#fff;padding:10px 18px;border-radius:22px;font-size:.9rem;opacity:0;
    transition:.25s;pointer-events:none;max-width:80%;text-align:center}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ==================== 手寫版面（個人層 · 依配色規範：灰黑白 + #535f81/#ebeef8，以虛線框與格線紙區別） ==================== */
  :root{ --hw:#535f81; --hw-soft:#ebeef8; --hw-paper:#fbfcfe; --hw-line:#dbe0ee; --hw-ink:#22252b; }
  .hw-entry{background:var(--hw-soft)}
  .hw-entry h3{color:var(--hw-ink)}
  .hw-card{background:var(--hw-paper);border:1px dashed var(--hw);border-radius:14px;padding:14px;margin:14px 0;
    box-shadow:0 1px 3px rgba(60,70,100,.08)}
  .hw-card h2{color:var(--hw-ink);font-size:1.02rem;margin:0 0 8px}
  .hw-tag{display:inline-block;background:var(--hw-soft);color:var(--hw);border:1px solid var(--hw-line);
    border-radius:999px;padding:1px 9px;font-size:.72rem;vertical-align:2px;margin-left:6px}
  .hw-item{display:flex;align-items:center;gap:10px;background:var(--hw-paper);border:1px dashed var(--hw-line);
    border-left:4px solid var(--hw);border-radius:12px;padding:10px 12px;margin:8px 0;cursor:pointer}
  .hw-item:active{transform:scale(.995)}
  .hw-item .icon{flex:0 0 auto;font-size:.72rem;font-weight:700;color:var(--hw);background:var(--hw-soft);
    border:1px solid var(--hw-line);border-radius:7px;padding:3px 7px}
  .hw-item .t{font-weight:700;color:var(--hw-ink)}
  .hw-item .m{font-size:.78rem;color:var(--muted)}
  .hw-item .arw{margin-left:auto;color:#b9c0d4}
  .case{border-left:3px solid var(--accent-soft);padding:4px 0 6px 10px;margin:10px 0}
  .case-t{font-weight:700;color:var(--accent);font-size:.95rem}
  .case-pts{margin:4px 0;padding-left:18px}
  .case-pts li{font-size:.92rem;margin:3px 0}
  .case-link{display:inline-block;font-size:.85rem;color:var(--accent);margin-top:4px;text-decoration:none}
  .hw-photos{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin:8px 0}
  .hw-photos .ph{position:relative;border:1px solid var(--hw-line);border-radius:10px;overflow:hidden;background:#fff}
  .hw-photos img{width:100%;display:block;cursor:zoom-in}
  .hw-photos .del{position:absolute;top:4px;right:4px;background:rgba(30,35,50,.65);color:#fff;border:none;
    border-radius:50%;width:22px;height:22px;line-height:20px;cursor:pointer;font-size:.8rem}
  .hw-file{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--hw-line);border-radius:10px;
    padding:9px 12px;margin:6px 0;cursor:pointer;color:var(--hw-ink);font-weight:600}
  .hw-title{width:100%;padding:10px 12px;border:1px solid var(--hw-line);border-radius:10px;font-size:1.05rem;
    font-weight:700;color:var(--hw-ink);background:var(--hw-paper)}
  .hw-select{width:100%;padding:9px 10px;border:1px solid var(--hw-line);border-radius:10px;background:#fff;
    color:var(--hw-ink);font-size:.92rem}
  .hw-note-label{font-size:.78rem;color:var(--ink2);margin:12px 2px 4px;font-weight:700;letter-spacing:.5px}
  .hw-btn{border:none;background:var(--hw);color:#fff;border-radius:10px;padding:9px 14px;font-size:.9rem;
    font-weight:700;cursor:pointer}
  .hw-btn.ghost{background:#fff;color:var(--hw);border:1px solid var(--hw)}
  .hw-btn.danger{background:#fff;color:var(--danger);border:1px solid var(--danger)}
  .hw-zoom{position:fixed;inset:0;background:rgba(10,14,26,.85);z-index:60;display:flex;align-items:center;
    justify-content:center;cursor:zoom-out}
  .hw-zoom img{max-width:96vw;max-height:92vh;border-radius:8px}
</style>
</head>

let CONTENT = loadContent();
let SURGERIES = CONTENT.surgeries;
let TAXO = CONTENT.taxo;
let DRUGS = CONTENT.drugs;
let DEPTS = CONTENT.depts;
let LINKS = CONTENT.links;
let CRISES = CONTENT.crises;
let REFS = CONTENT.refs;
let adminAuthed = false;

function loadContent(){
  let c=null;
  try{ c = JSON.parse(localStorage.getItem('asm_content')); }catch(e){}
  if(!(c && Array.isArray(c.surgeries) && c.taxo)){
    c = { surgeries: clone(DEFAULT_SURGERIES), taxo: clone(DEFAULT_TAXO), drugs: clone(DEFAULT_DRUGS), depts: clone(DEFAULT_DEPTS), links: clone(DEFAULT_LINKS) };
  }
  if(!Array.isArray(c.drugs)) c.drugs = clone(DEFAULT_DRUGS); // 舊版內容遷移
  if(!Array.isArray(c.depts)) c.depts = clone(DEFAULT_DEPTS);
  if(!Array.isArray(c.links)) c.links = clone(DEFAULT_LINKS);
  if(!Array.isArray(c.crises)) c.crises = clone(DEFAULT_CRISES);
  if(!Array.isArray(c.refs)) c.refs = clone(DEFAULT_REFS);
  // 補齊新版預設（只加缺少的 id；被自己刪過的記在 removed，不會回來）
  if(!Array.isArray(c.removed)) c.removed = [];
  DEFAULT_LINKS.forEach(d=>{ if(!c.removed.includes(d.id) && !c.links.some(x=>x.id===d.id)) c.links.push(clone(d)); });
  DEFAULT_SURGERIES.forEach(d=>{ if(!c.removed.includes(d.id) && !c.surgeries.some(x=>x.id===d.id)) c.surgeries.push(clone(d)); });
  DEFAULT_CRISES.forEach(d=>{ if(!c.removed.includes(d.id) && !c.crises.some(x=>x.id===d.id)) c.crises.push(clone(d)); });
  DEFAULT_REFS.forEach(d=>{ if(!c.removed.includes(d.id) && !c.refs.some(x=>x.id===d.id)) c.refs.push(clone(d)); });
  return c;
}
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function saveContent(){ try{ localStorage.setItem('asm_content', JSON.stringify(CONTENT)); }catch(e){ toast('儲存失敗（空間不足或隱私模式）'); } }
function resetContent(){
  askConfirm('確定要重設為預設內容？本機的所有編輯將清除（建議先匯出備份）。', function(){
    try{ localStorage.removeItem('asm_content'); }catch(e){}
    CONTENT = loadContent(); SURGERIES = CONTENT.surgeries; TAXO = CONTENT.taxo; DRUGS = CONTENT.drugs; DEPTS = CONTENT.depts; LINKS = CONTENT.links; CRISES = CONTENT.crises; REFS = CONTENT.refs;
    toast('已重設為預設'); go('admin');
  });
}

function goBack(){ if(window.history.length>1){ window.history.back(); } else { go('home'); } }

function render(){
  const [view, arg] = (location.hash.replace(/^#/,'')||'home').split('/');
  window.scrollTo(0,0);
  const bb=document.getElementById('backbtn'); if(bb) bb.style.display = (view==='home'||!view)?'none':'inline-block';
  const adminViews=['admin','edit','editnew','axisedit','data','editdrug','editdrugnew','editdepts','editlink','editlinknew'];
  if(adminViews.includes(view) && !adminAuthed){ go('home'); return; }
  if(view==='home') return renderHome();
  if(view==='axis') return renderAxis(arg);
  if(view==='dept') return renderDept(arg);
  if(view==='surgery') return renderSurgery(arg);
  if(view==='drug') return renderDrug(arg);
  if(view==='crisiscard') return renderCrisis(arg);
  if(view==='refcard') return renderRef(arg);
  if(view==='tools') return renderTools();
  if(view==='notes') return renderNotes();
  if(view==='note') return renderNote(arg);
  if(view==='editdepts') return renderEditDepts();
  if(view==='editlink') return renderEditLink(arg);
  if(view==='editlinknew') return renderEditLink(null);
  if(view==='login') return renderLogin();
  if(view==='admin') return renderAdmin();
  if(view==='edit') return renderEditSurgery(arg);
  if(view==='editnew') return renderEditSurgery(null);
  if(view==='editdrug') return renderEditDrug(arg);
  if(view==='editdrugnew') return renderEditDrug(null);
  if(view==='axisedit') return renderEditAxis(arg);
  if(view==='data') return renderData();
  renderHome();
}

/* ---- 文字 <-> 結構 轉換 ---- */
function splitLines(t){ return (t||'').replace(/\r/g,'').split('\n'); }
function commaList(t){ return (t||'').split(/[,，、]/).map(s=>s.trim()).filter(Boolean); }
function parseKV(b){ const o={}; splitLines(b).forEach(l=>{ const m=l.match(/^\s*([^:：]+)[：:]\s*(.*)$/); if(m) o[m[1].trim()]=m[2].trim(); }); return o; }
function blocks(t){ return (t||'').replace(/\r/g,'').split(/\n\s*\n/).map(b=>b.trim()).filter(Boolean); }

function prepToText(prep){ return (prep||[]).map(g=>'# '+g.g+'\n'+(g.items||[]).join('\n')).join('\n\n'); }
function textToPrep(t){
  const out=[]; let cur=null;
  splitLines(t).forEach(ln=>{ const s=ln.trim(); if(!s) return;
    if(s[0]==='#'){ cur={g:s.replace(/^#+\s*/,''),items:[]}; out.push(cur); }
    else { if(!cur){ cur={g:'未分類',items:[]}; out.push(cur); } cur.items.push(s); } });
  return out;
}
const axisToText=prepToText, textToAxis=textToPrep;

function timelineToText(tl){ return (tl||[]).map(r=>r.when+' | '+r.what).join('\n'); }
function textToTimeline(t){ return splitLines(t).map(l=>l.trim()).filter(Boolean).map(l=>{
  const i=l.indexOf('|'); if(i<0) return {when:'',what:l};
  return {when:l.slice(0,i).trim(), what:l.slice(i+1).trim()}; }); }

function crisisToText(cr){ return (cr||[]).map(c=>`標題: ${c.t}\n先看: ${c.see}\n先做: ${c.do}\n通知: ${c.tell}\n準備: ${c.prep}`).join('\n\n'); }
function textToCrisis(t){ return blocks(t).map(b=>{const o=parseKV(b);return{t:o['標題']||'',see:o['先看']||'',do:o['先做']||'',tell:o['通知']||'',prep:o['準備']||''};}); }

function quizToText(qz){ return (qz||[]).map(q=>`問: ${q.q}\n選項: ${(q.opts||[]).join(' | ')}\n答案: ${(q.a==null?0:q.a)+1}\n說明: ${q.exp||''}`).join('\n\n'); }
function textToQuiz(t){ return blocks(t).map(b=>{const o=parseKV(b);
  const opts=(o['選項']||'').split('|').map(s=>s.trim()).filter(Boolean);
  let a=parseInt(o['答案'],10); a=isNaN(a)?1:a; a=Math.max(1,Math.min(opts.length||1,a))-1;
  return {q:o['問']||'',opts:opts,a:a,exp:o['說明']||''}; }); }

// 判斷單一物件是手術或藥物（欄位特徵）
function looksDrug(o){ return o && ['dose','form','onset','dur','cat','cls','insert','brand'].some(k=>k in o); }
function looksSurgery(o){ return o && ['dept','prep','timeline','rookie','flags','banner','lv','risk'].some(k=>k in o); }
function mergeCard(list, it, prefix){
  if(!it || typeof it!=='object') return false;
  if(!it.id) it.id = prefix+Date.now().toString(36)+Math.floor(Math.random()*1e4);
  const i=list.findIndex(x=>x.id===it.id);
  if(i>=0) list[i]=it; else list.push(it);
  return true;
}
function doAppendImport(){
  const t=(document.getElementById('f_append').value||'').trim();
  if(!t){ toast('請先貼上 JSON'); return; }
  let obj; try{ obj=JSON.parse(t); }catch(e){ toast('解析失敗：'+e.message); return; }
  let s=0, d=0, x=0, rf=0;
  const addOne=o=>{ if(looksDrug(o)&&!looksSurgery(o)){ if(mergeCard(DRUGS,o,'d')) d++; }
                    else if(looksSurgery(o)&&!looksDrug(o)){ if(mergeCard(SURGERIES,o,'s')) s++; }
                    else { throw new Error('unknown'); } };
  try{
    if(Array.isArray(obj)){ obj.forEach(addOne); }
    else if(obj.surgeries||obj.drugs||obj.links||obj.crises||obj.refs){
      (obj.surgeries||[]).forEach(o=>{ if(mergeCard(SURGERIES,o,'s')) s++; });
      (obj.drugs||[]).forEach(o=>{ if(mergeCard(DRUGS,o,'d')) d++; });
      (obj.links||[]).forEach(o=>{ mergeCard(LINKS,o,'l'); });
      (obj.crises||[]).forEach(o=>{ if(mergeCard(CRISES,o,'x')) x++; });
      (obj.refs||[]).forEach(o=>{ if(mergeCard(REFS,o,'r')) rf++; });
      if(Array.isArray(obj.depts)) obj.depts.forEach(x2=>{ if(!DEPTS.includes(x2)) DEPTS.push(x2); });
    }
    else { addOne(obj); }
  }catch(e){ toast('無法判斷是手術或藥物，請檢查欄位或用「type」包裝'); return; }
  saveContent(); toast('已附加：手術 '+s+'、藥物 '+d+'、危機 '+x+'、參考卡 '+rf); go('admin');
}
function doExport(){
  const blob=new Blob([JSON.stringify(CONTENT,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='麻醉安全導航_內容_'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function applyImport(obj){
  if(!obj||!Array.isArray(obj.surgeries)||!obj.taxo){ toast('格式不符：需含 surgeries 與 taxo'); return; }
  if(!Array.isArray(obj.drugs)) obj.drugs=[];
  if(!Array.isArray(obj.depts)) obj.depts=clone(DEFAULT_DEPTS);
  if(!Array.isArray(obj.links)) obj.links=[];
  if(!Array.isArray(obj.crises)) obj.crises=clone(DEFAULT_CRISES);
  if(!Array.isArray(obj.refs)) obj.refs=clone(DEFAULT_REFS);
  CONTENT=obj; SURGERIES=CONTENT.surgeries; TAXO=CONTENT.taxo; DRUGS=CONTENT.drugs; DEPTS=CONTENT.depts; LINKS=CONTENT.links; CRISES=CONTENT.crises; REFS=CONTENT.refs; saveContent(); toast('匯入成功'); go('admin');
}
function doImportFile(ev){
  const f=ev.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{ applyImport(JSON.parse(r.result)); }catch(e){ toast('讀取失敗：'+e.message); } };
  r.readAsText(f);
}
function doImportPaste(){
  const t=document.getElementById('f_paste').value.trim(); if(!t){ toast('請先貼上 JSON'); return; }
  try{ applyImport(JSON.parse(t)); }catch(e){ toast('解析失敗：'+e.message); }
}

   created:'2026-07-06',updated:'2026-07-06',photos:[]}
];
let NOTEBOOK={items:[],hidden:[]};
try{ const nb=JSON.parse(localStorage.getItem('asm_notes')); if(nb&&Array.isArray(nb.items)){ NOTEBOOK=nb; if(!Array.isArray(NOTEBOOK.hidden)) NOTEBOOK.hidden=[]; } }catch(e){}
function saveNotes(){ try{ localStorage.setItem('asm_notes',JSON.stringify(NOTEBOOK)); }catch(e){ toast('筆記儲存失敗：空間不足。請先匯出備份或刪除部分照片。'); } }
function today(){ return new Date().toISOString().slice(0,10); }
function allNotes(){
  const own=NOTEBOOK.items;
  const def=DEFAULT_NOTES.filter(d=>!NOTEBOOK.hidden.includes(d.id)&&!own.some(o=>o.id===d.id));
  return def.concat(own).slice().sort((a,b)=>(b.updated||'').localeCompare(a.updated||''));
}
function getNote(id){ return allNotes().find(n=>n.id===id); }
function ownNote(id){ // 編輯前把預設筆記變成自己的可編輯版本
  let n=NOTEBOOK.items.find(x=>x.id===id);
  if(!n){ const d=DEFAULT_NOTES.find(x=>x.id===id); if(d){ n=clone(d); NOTEBOOK.items.push(n); } }
  return n;
}

  const isDef=!NOTEBOOK.items.some(x=>x.id===id);
  const opts=['<option value="">（不連結手術）</option>'];
  DEPTS.forEach(dp=>{ SURGERIES.filter(s=>(s.dept||'')===dp).forEach(s=>{
    opts.push(`<option value="${s.id}" ${n.surgId===s.id?'selected':''}>${esc(dp+'｜'+s.name)}</option>`); }); });
  let h=`<h1 class="page">手寫筆記</h1>
  <p class="sub">個人層 · 只存在這台裝置${isDef?'（預設示範，開始編輯後會變成你的版本）':''}</p>
  <div class="hw-note-label">標題</div>
  <input class="hw-title" value="${esc(n.title||'')}" onchange="hwSetTitle('${id}',this.value)" placeholder="例如：ROSA TKR 個案重點">
  <div class="hw-note-label">連結手術</div>
  <select class="hw-select" onchange="hwSetSurg('${id}',this.value)">${opts.join('')}</select>
  <div class="hw-note-label">檔案連結（GoodNotes / Notion 匯出的 PDF：把檔案放進網站同資料夾的「手寫筆記」內，這裡填路徑；也可填完整網址）</div>
  <input class="hw-select" value="${esc(n.file||'')}" placeholder="例如：手寫筆記/ROSA.pdf 或 https://…" onchange="hwSetFile('${id}',this.value)">`;
  if(n.file){ h+=`<div class="hw-file" onclick="hwOpenFile('${id}')">${esc(n.fileLabel||n.file)} ↗</div>`; }
  h+=`<div class="hw-note-label">照片（紙本筆記拍照 / GoodNotes、Notion 頁面截圖）</div>
  <div class="hw-photos" id="hwPhotos"></div>
  <div class="btnrow" style="margin-top:8px">
    <button class="hw-btn ghost" onclick="document.getElementById('hw_ph').click()">加照片</button>
    <input type="file" id="hw_ph" accept="image/*" multiple style="display:none" onchange="hwAddPhotos('${id}',event)">
    <button class="hw-btn danger" onclick="hwDelete('${id}')">刪除這則筆記</button>
  </div>`;
  app.innerHTML=h;
  hwRenderPhotos(id);
}

function hwOpenFile(id){
  const n=getNote(id); if(!n||!n.file) return;
  window.open(encodeURI(n.file),'_blank');
}
function hwSetFile(id,v){
  const n=ownNote(id); if(!n) return;
  n.file=v.trim(); if(!n.file) delete n.fileLabel;
  n.updated=today(); saveNotes(); renderNote(id);
}
function hwSetTitle(id,v){ const n=ownNote(id); if(n){ n.title=v.trim(); n.updated=today(); saveNotes(); } }
function hwSetSurg(id,v){ const n=ownNote(id); if(n){ n.surgId=v; n.updated=today(); saveNotes(); } }
function hwDelete(id){
  if(!confirm('刪除這則手寫筆記？'))return;
  NOTEBOOK.items=NOTEBOOK.items.filter(x=>x.id!==id);
  if(DEFAULT_NOTES.some(d=>d.id===id)&&!NOTEBOOK.hidden.includes(id)) NOTEBOOK.hidden.push(id);
  saveNotes(); go('notes');
}

/* --- 照片 --- */
function hwRenderPhotos(id){
  const n=getNote(id); const box=document.getElementById('hwPhotos'); if(!box||!n) return;
  box.innerHTML=(n.photos||[]).map((p,i)=>`<div class="ph"><img src="${p}" onclick="hwZoom('${id}',${i})">
    <button class="del" onclick="hwDelPhoto('${id}',${i})">✕</button></div>`).join('');
}
function hwZoom(id,i){
  const n=getNote(id); if(!n||!n.photos[i]) return;
  const d=document.createElement('div'); d.className='hw-zoom'; d.onclick=()=>d.remove();
  const img=document.createElement('img'); img.src=n.photos[i]; d.appendChild(img);
  document.body.appendChild(d);
}
function hwDelPhoto(id,i){
  if(!confirm('刪除這張照片？'))return;
  const n=ownNote(id); if(!n) return;
  n.photos.splice(i,1); n.updated=today(); saveNotes(); hwRenderPhotos(id);
}
function hwAddPhotos(id,ev){
  const files=Array.prototype.slice.call(ev.target.files||[]); if(!files.length) return;
  const n=ownNote(id); if(!n) return;
  let left=files.length;
  files.forEach(f=>{
    const img=new Image();
    img.onload=()=>{
      const mx=1280, r=Math.min(1,mx/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*r); c.height=Math.round(img.height*r);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      (n.photos=n.photos||[]).push(c.toDataURL('image/jpeg',.82));
      URL.revokeObjectURL(img.src);
      if(--left===0){ n.updated=today(); saveNotes(); hwRenderPhotos(id); toast('已加入 '+files.length+' 張照片'); }
    };
    img.onerror=()=>{ if(--left===0){ saveNotes(); hwRenderPhotos(id); } toast('有照片讀取失敗'); };
    img.src=URL.createObjectURL(f);
  });
  ev.target.value='';
}

/* --- 備份 --- */
function notesExport(){
  const blob=new Blob([JSON.stringify({notes:allNotes()},null,1)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='手寫筆記備份_'+today()+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function notesImportFile(ev){
  const f=ev.target.files[0]; if(!f) return; const r=new FileReader();
  r.onload=()=>{ try{
    const o=JSON.parse(r.result); const arr=Array.isArray(o)?o:(o.notes||[]);
    let c=0; arr.forEach(n=>{ if(!n||!n.id) return;
      const i=NOTEBOOK.items.findIndex(x=>x.id===n.id);
      if(i>=0) NOTEBOOK.items[i]=n; else NOTEBOOK.items.push(n);
      NOTEBOOK.hidden=NOTEBOOK.hidden.filter(x=>x!==n.id); c++; });
    saveNotes(); toast('已匯入 '+c+' 則筆記'); renderNotes();
  }catch(e){ toast('讀取失敗：'+e.message); } };
  r.readAsText(f); ev.target.value='';
}

render();
</script>
